name: Frontend Tests

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    name: Lint and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: |
          mkdir -p reports
          npm test -- --reporter=default --reporter=junit --outputFile=reports/vitest-junit.xml

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vitest-junit-report
          path: reports/vitest-junit.xml
